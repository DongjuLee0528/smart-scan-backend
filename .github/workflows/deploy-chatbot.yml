# Smart Scan 챗봇 스킬 서버 배포 파이프라인
#
# 카카오톡 챗봇 스킬 서버 Lambda 함수의 자동 배포를 위한 GitHub Actions 워크플로우
# 테스트 실행 후 AWS Lambda에 자동으로 배포합니다.
#
# 트리거 조건:
# - main 브랜치에 챗봇 스킬 서버 코드 푸시 시
# - 수동 워크플로우 실행 (workflow_dispatch)
#
# 배포 단계:
# 1. 테스트 실행으로 코드 품질 검증
# 2. AWS 인증 및 권한 설정
# 3. 의존성 패키징 및 Lambda 함수 업데이트
# 4. Python 3.12 런타임 환경으로 배포

name: Deploy Chatbot-Skill-Server

on:
  push:
    branches: [main]                              # main 브랜치 푸시 시
    paths:
      - 'lambdas/chatbot-skill-server/**'        # 챗봇 스킬 서버 코드 변경 시
  workflow_dispatch:                              # 수동 실행 허용

# AWS IAM 역할 사용을 위한 권한 설정
permissions:
  id-token: write                                 # OIDC 토큰 생성 권한
  contents: read                                  # 레포지토리 읽기 권한

# 환경 변수 정의
env:
  AWS_REGION: ap-northeast-2                     # AWS 서울 리전
  LAMBDA_FUNCTION_NAME: smartscan-chatbot        # Lambda 함수명
  LAMBDA_DIRECTORY: lambdas/chatbot-skill-server # 소스 디렉토리

jobs:
  # 챗봇 스킬 서버 배포 작업
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 소스 코드 체크아웃
      - uses: actions/checkout@v4

      # Python 3.12 환경 설정 (Lambda 런타임과 동일)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 배포 전 테스트 실행으로 코드 품질 검증
      - name: Run tests before deploy
        run: |
          pip install pytest supabase resend boto3 --quiet
          PYTHONPATH=lambdas/chatbot-skill-server pytest lambdas/chatbot-skill-server/tests/ -v

      # AWS 인증 설정 (OIDC를 통한 역할 기반 인증)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # GitHub Secrets에서 IAM 역할 ARN 가져오기
          aws-region: ap-northeast-2

      # 의존성 패키징 및 Lambda 함수 배포
      - name: Package and Deploy
        run: |
          cd lambdas/chatbot-skill-server
          # Lambda 런타임 환경에 맞는 의존성 패키지 설치
          pip install -r requirements.txt -t ./package --quiet \
            --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.12
          # 소스 코드 복사
          cp -r ../lambda_shared ./package/ # 공유 모듈
          cp -r common ./package/          # 공통 모듈
          cp -r repositories ./package/    # 데이터 접근 계층
          cp -r services ./package/        # 비즈니스 로직 계층
          cp lambda_function.py ./package/ # Lambda 핸들러
          # ZIP 패키지 생성 및 배포
          cd package && zip -r ../function.zip . -q
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://../function.zip
