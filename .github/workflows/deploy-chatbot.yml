name: Deploy Chatbot-Skill-Server

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/chatbot-skill-server/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  LAMBDA_FUNCTION_NAME: smartscan-chatbot
  LAMBDA_DIRECTORY: lambdas/chatbot-skill-server

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests before deploy
        run: |
          pip install pytest supabase resend boto3 --quiet
          PYTHONPATH=lambdas/chatbot-skill-server pytest lambdas/chatbot-skill-server/tests/ -v

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Package and Deploy
        run: |
          cd lambdas/chatbot-skill-server
          pip install -r requirements.txt -t ./package --quiet
          cp -r common ./package/
          cp -r repositories ./package/
          cp -r services ./package/
          cp lambda_function.py ./package/
          cd package && zip -r ../function.zip . -q
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://../function.zip
