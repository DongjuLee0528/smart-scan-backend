name: Deploy Inbound-Scanner

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/inbound-scanner/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  LAMBDA_FUNCTION_NAME: inbound-scanner
  LAMBDA_DIRECTORY: lambdas/inbound-scanner

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Package and Deploy
        run: |
          cd lambdas/inbound-scanner
          pip install -r requirements.txt -t ./package --quiet
          cp lambda_function.py ./package/
          cd package && zip -r ../function.zip . -q
          aws lambda update-function-code \
            --function-name Inbound-Scanner \
            --zip-file fileb://../function.zip
