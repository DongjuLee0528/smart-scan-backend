# Smart Scan Backend Pytest 설정
#
# 백엔드 코드만 테스트하여 Lambda 함수들과의 conftest.py 충돌을 방지합니다.
# importlib 임포트 모드를 사용하여 모듈 경로 충돌을 방지합니다.

[pytest]
# 테스트 경로를 backend/tests로 제한하여 Lambda 함수들과의 충돌 방지
testpaths = backend/tests

# importlib 모드로 모듈 임포트 (Python 패키지 구조와 호환)
addopts = --import-mode=importlib

# Python path는 PYTHONPATH 환경 변수로 설정 필요
# export PYTHONPATH="${PYTHONPATH}:$(pwd)/backend"

# Lambda 디렉토리 제외
norecursedirs = lambdas
