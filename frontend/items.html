  <div id="addItemModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4 sm:p-6">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col">

        <h2 class="text-lg font-bold text-slate-900">새 소지품 추가</h2>
        <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-1.5 rounded-md transition-colors" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <form class="p-6 space-y-5 overflow-y-auto" onsubmit="return false;">
        <div class="space-y-1.5">
          <label for="itemName" class="block text-sm font-medium text-slate-700">소지품 이름 <span class="text-red-500">*</span></label>
          <input type="text" id="itemName" placeholder="예: 지갑, 차키, 학생증" class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-[#034EA2]/20 focus:border-[#034EA2] transition-shadow bg-white placeholder:text-slate-400 text-slate-900" />
        </div>
        
        <div class="space-y-1.5">
          <label class="block text-sm font-medium text-slate-700">소유자</label>
          <input type="text" id="fixedMemberName" class="w-full px-3.5 py-2.5 text-sm border border-slate-200 bg-slate-50 rounded-lg text-slate-500 outline-none cursor-not-allowed" readonly />
        </div>

        <div class="space-y-1.5">
          <label for="rfidUid" class="block text-sm font-medium text-slate-700">RFID 태그 UID <span class="text-red-500">*</span></label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <path d="M4 10h16"/><path d="M4 14h16"/>
              </svg>
            </div>
            <input type="text" id="rfidUid" placeholder="E28011912000702" class="w-full pl-10 pr-3.5 py-2.5 text-sm border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-[#034EA2]/20 focus:border-[#034EA2] transition-shadow bg-white font-mono placeholder:text-slate-400 text-slate-900" />
          </div>
        </div>
        <div class="space-y-1.5">
          <label class="block text-sm font-medium text-slate-700">필수 여부</label>
          <div class="flex gap-3">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="required" value="required" class="text-[#034EA2] focus:ring-[#034EA2]/20" checked>
              <span class="text-sm text-slate-700">필수 소지품</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="required" value="optional" class="text-[#034EA2] focus:ring-[#034EA2]/20">
              <span class="text-sm text-slate-700">선택 소지품</span>
            </label>
          </div>
        </div>
        <div class="pt-2 flex gap-3">
          <button type="button" id="cancelModalBtn" class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">취소</button>
          <button type="submit" class="flex-1 px-4 py-2.5 bg-[#034EA2] rounded-lg text-sm font-medium text-white hover:bg-[#023d82] shadow-sm transition-colors">등록</button>
        </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ===== 로그인 정보 자동 반영 =====
      const savedName = localStorage.getItem('userName') || '사용자';
      const savedEmail = localStorage.getItem('userEmail') || 'user@smartscan-hub.com';

      const userNameEl = document.getElementById('userName');
      const userEmailEl = document.getElementById('userEmail');
      const userAvatarEl = document.getElementById('userAvatar');
      
      // 모달 내 소유자 이름 고정
      const fixedMemberNameEl = document.getElementById('fixedMemberName');

      if (userNameEl) userNameEl.textContent = savedName;
      if (userEmailEl) userEmailEl.textContent = savedEmail;
      if (userAvatarEl && savedName) userAvatarEl.textContent = savedName.trim().charAt(0);
      if (fixedMemberNameEl) fixedMemberNameEl.value = savedName;

      // 카드 내의 모든 소유자 이름을 로그인한 사용자 이름으로 변경
      const cardOwnerNames = document.querySelectorAll('.current-user-name');
      cardOwnerNames.forEach(nameTag => {
        nameTag.textContent = savedName;
      });

      // ===== 모달 및 버튼 제어 =====
      const modal = document.getElementById('addItemModal');
      const addBtn = document.getElementById('addItemBtn');
      const closeBtn = document.getElementById('closeModalBtn');
      const cancelBtn = document.getElementById('cancelModalBtn');

      const openModal = () => { modal.classList.remove('hidden'); modal.classList.add('flex'); };
      const closeModal = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };

      addBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      cancelBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    });
  </script>
