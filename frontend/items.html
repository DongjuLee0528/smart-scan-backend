<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소지품 관리 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="assets/styles.css" rel="stylesheet" />
  <script src="assets/api.js"></script>
  <script src="assets/common.js"></script>
  <script src="assets/layout.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden antialiased">
  <aside id="sidebar-mount"></aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center px-6 shrink-0">
      <h1 class="text-lg font-semibold text-slate-800">소지품 관리</h1>
    </header>

    <div class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto max-w-5xl w-full mx-auto">
      <div class="flex items-start justify-between mb-6">
        <div>
          <h2 class="text-2xl font-bold text-slate-900">내 소지품</h2>
          <p class="text-slate-500 text-sm mt-1">새 소지품을 등록하고 이름이나 라벨을 수정하거나 삭제할 수 있습니다.</p>
        </div>
        <button id="add-btn" class="px-4 py-2.5 bg-[#034EA2] text-white text-sm font-semibold rounded-lg hover:bg-[#023d82] flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          소지품 추가
        </button>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100 text-slate-500 bg-slate-50/50">
              <th class="text-left font-medium px-6 py-3">이름</th>
              <th class="text-left font-medium px-6 py-3">라벨</th>
              <th class="text-left font-medium px-6 py-3">등록일</th>
              <th class="text-right font-medium px-6 py-3">작업</th>
            </tr>
          </thead>
          <tbody id="items-tbody" class="divide-y divide-slate-100">
            <tr><td colspan="4" class="px-6 py-8 text-center text-slate-400">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 모달 -->
  <div id="modal" class="hidden fixed inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 id="modal-title" class="text-lg font-bold text-slate-900">소지품 추가</h3>
        <button id="modal-close" class="p-1 text-slate-400 hover:text-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <form id="item-form" class="p-6 space-y-4">
        <input type="hidden" id="item-id" value="" />
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">이름</label>
          <input id="item-name" type="text" required maxlength="30" placeholder="예: 지갑" class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg bg-white" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">라벨 번호</label>
          <select id="item-label" required class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg bg-white">
            <option value="">라벨을 선택하세요</option>
          </select>
          <p class="text-xs text-slate-400 mt-1">RFID 태그와 매칭되는 라벨 번호입니다.</p>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="modal-cancel" class="px-4 py-2 text-sm font-medium text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50">취소</button>
          <button id="item-submit" type="submit" class="px-4 py-2 bg-[#034EA2] text-white text-sm font-semibold rounded-lg hover:bg-[#023d82] disabled:opacity-60">저장</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    smartscanLayout.init({ active: 'items' });
    const esc = smartscanLayout.escapeHtml;
    const fmt = smartscanLayout.formatDateTime;

    const modal = document.getElementById('modal');
    const form = document.getElementById('item-form');
    let cachedAvailableLabels = [];

    function openModal(item) {
      document.getElementById('modal-title').textContent = item ? '소지품 수정' : '소지품 추가';
      document.getElementById('item-id').value = item ? item.id : '';
      document.getElementById('item-name').value = item ? item.name : '';

      // 라벨 select 채우기 (수정 시 현재 라벨도 포함)
      const sel = document.getElementById('item-label');
      sel.innerHTML = '<option value="">라벨을 선택하세요</option>';
      const opts = [...cachedAvailableLabels];
      if (item && !opts.includes(item.label_id)) opts.push(item.label_id);
      opts.sort((a, b) => a - b).forEach((n) => {
        const o = document.createElement('option');
        o.value = n; o.textContent = `#${n}`;
        sel.appendChild(o);
      });
      if (item) sel.value = item.label_id;

      modal.classList.remove('hidden');
    }

    function closeModal() { modal.classList.add('hidden'); form.reset(); }

    document.getElementById('add-btn').addEventListener('click', async () => {
      try {
        const res = await smartscanApi.getAvailableLabels();
        cachedAvailableLabels = (res.data && res.data.available_labels) || [];
        if (cachedAvailableLabels.length === 0) {
          smartscanLayout.toast('사용 가능한 라벨이 없습니다.', 'error');
          return;
        }
        openModal(null);
      } catch (err) {
        smartscanLayout.toast(err.message || '라벨 조회 실패', 'error');
      }
    });
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('item-id').value;
      const name = document.getElementById('item-name').value.trim();
      const label_id = parseInt(document.getElementById('item-label').value, 10);
      const btn = document.getElementById('item-submit');
      btn.disabled = true;
      try {
        if (id) {
          await smartscanApi.updateItem(id, { name, label_id });
          smartscanLayout.toast('수정되었습니다.', 'success');
        } else {
          await smartscanApi.addItem({ name, label_id });
          smartscanLayout.toast('추가되었습니다.', 'success');
        }
        closeModal();
        load();
      } catch (err) {
        smartscanLayout.toast(err.message || '저장 실패', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    async function editItem(item) {
      try {
        const res = await smartscanApi.getAvailableLabels();
        cachedAvailableLabels = (res.data && res.data.available_labels) || [];
      } catch (_) { cachedAvailableLabels = []; }
      openModal(item);
    }

    async function bindItem(item) {
      try {
        const res = await smartscanApi.getAvailableLabels();
        const available = (res.data && res.data.available_labels) || [];
        if (available.length === 0) {
          smartscanLayout.toast('사용 가능한 라벨이 없습니다.', 'error');
          return;
        }
        const choice = prompt(
          `'${item.name}'에 연결할 라벨 번호를 입력하세요.\n사용 가능한 라벨: ${available.sort((a,b)=>a-b).map(n=>'#'+n).join(', ')}`,
          String(available[0])
        );
        if (choice === null) return;
        const label_id = parseInt(choice, 10);
        if (!label_id || !available.includes(label_id)) {
          smartscanLayout.toast('유효한 라벨 번호가 아닙니다.', 'error');
          return;
        }
        await smartscanApi.bindItemLabel(item.id, label_id);
        smartscanLayout.toast('라벨이 연결되었습니다.', 'success');
        load();
      } catch (err) {
        smartscanLayout.toast(err.message || '라벨 연결 실패', 'error');
      }
    }

    async function removeItem(id, name) {
      if (!confirm(`'${name}'을(를) 삭제하시겠습니까?`)) return;
      try {
        await smartscanApi.deleteItem(id);
        smartscanLayout.toast('삭제되었습니다.', 'success');
        load();
      } catch (err) {
        smartscanLayout.toast(err.message || '삭제 실패', 'error');
      }
    }

    async function load() {
      const tbody = document.getElementById('items-tbody');
      try {
        const res = await smartscanApi.getItems();
        const items = (res.data && res.data.items) || [];
        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400">등록된 소지품이 없습니다. 우측 상단에서 추가하세요.</td></tr>`;
          return;
        }
        tbody.innerHTML = items.map((it) => {
          const isPending = !!it.is_pending;
          const labelCell = isPending
            ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-medium rounded-full bg-amber-50 text-amber-700 border border-amber-200">라벨 연결 필요</span>`
            : `<span class="text-slate-600">#${it.label_id}</span>`;
          const actions = isPending
            ? `<button data-action="bind" class="px-2.5 py-1 text-xs font-semibold text-white bg-[#034EA2] rounded-md hover:bg-[#023d82] mr-1">라벨 연결</button>
               <button data-action="delete" class="px-2.5 py-1 text-xs font-medium text-red-600 border border-red-200 rounded-md hover:bg-red-50">삭제</button>`
            : `<button data-action="edit" class="px-2.5 py-1 text-xs font-medium text-slate-600 border border-slate-200 rounded-md hover:bg-slate-50 mr-1">수정</button>
               <button data-action="delete" class="px-2.5 py-1 text-xs font-medium text-red-600 border border-red-200 rounded-md hover:bg-red-50">삭제</button>`;
          return `
          <tr class="hover:bg-slate-50" data-id="${it.id}">
            <td class="px-6 py-4 font-semibold text-slate-800">
              ${esc(it.name)}
              ${isPending ? '<span class="ml-2 text-xs font-medium text-amber-600">· 챗봇 추가</span>' : ''}
            </td>
            <td class="px-6 py-4">${labelCell}</td>
            <td class="px-6 py-4 text-slate-500">${fmt(it.created_at)}</td>
            <td class="px-6 py-4 text-right">${actions}</td>
          </tr>`;
        }).join('');

        tbody.querySelectorAll('button[data-action]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const row = btn.closest('tr');
            const id = row.dataset.id;
            const item = items.find((x) => String(x.id) === String(id));
            const action = btn.dataset.action;
            if (action === 'edit') editItem(item);
            else if (action === 'bind') bindItem(item);
            else removeItem(id, item.name);
          });
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-red-500">조회 실패: ${esc(err.message)}</td></tr>`;
      }
    }

    load();
  </script>
</body>
</html>
