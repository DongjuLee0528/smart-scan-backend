<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기기 관리 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
  <script src="assets/api.js"></script>
  <script src="assets/layout.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden antialiased">
  <aside id="sidebar-mount"></aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center px-6 shrink-0">
      <h1 class="text-lg font-semibold text-slate-800">기기 관리</h1>
    </header>

    <div class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto max-w-4xl w-full mx-auto">
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-900">RFID 리더기</h2>
        <p class="text-slate-500 text-sm mt-1">등록된 리더기를 확인하고, 필요시 새 기기를 등록하거나 연결을 해제하세요.</p>
      </div>

      <div id="device-card" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
        <div class="text-center py-8 text-slate-400">불러오는 중...</div>
      </div>

      <div id="register-card" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 hidden">
        <h3 class="text-lg font-bold text-slate-900 mb-1">새 기기 등록</h3>
        <p class="text-sm text-slate-500 mb-4">리더기 본체에 적힌 시리얼 번호를 입력하세요.</p>
        <form id="register-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">시리얼 번호</label>
            <input id="serial-input" type="text" required placeholder="예: SSH-2025-0001" class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg bg-white" />
          </div>
          <button id="register-submit" type="submit" class="px-4 py-2.5 bg-[#034EA2] text-white text-sm font-semibold rounded-lg hover:bg-[#023d82] disabled:opacity-60">기기 등록</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    smartscanLayout.init({ active: 'devices' });
    const esc = smartscanLayout.escapeHtml;
    const fmt = smartscanLayout.formatDateTime;

    function renderConnected(d) {
      const dev = d.device || {};
      return `
        <div class="flex items-start justify-between gap-4">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
            </div>
            <div>
              <h3 class="text-lg font-bold text-slate-900">연결된 리더기</h3>
              <p class="mt-1 text-sm text-slate-500">시리얼: <span class="font-mono text-slate-800">${esc(dev.serial_number || '-')}</span></p>
              <p class="text-sm text-slate-500">등록일: ${fmt(d.created_at)}</p>
            </div>
          </div>
          <button id="unlink-btn" class="px-3.5 py-2 text-sm font-medium text-red-600 border border-red-200 rounded-lg hover:bg-red-50">연결 해제</button>
        </div>`;
    }

    function renderEmpty() {
      return `
        <div class="text-center py-4">
          <div class="w-12 h-12 mx-auto rounded-lg bg-slate-100 text-slate-400 flex items-center justify-center mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
          </div>
          <p class="text-slate-600 font-medium">등록된 기기가 없습니다.</p>
          <p class="text-sm text-slate-400 mt-1">아래에서 시리얼 번호로 기기를 등록하세요.</p>
        </div>`;
    }

    async function load() {
      const card = document.getElementById('device-card');
      const regCard = document.getElementById('register-card');
      try {
        const res = await smartscanApi.getMyDevice();
        if (res.data) {
          card.innerHTML = renderConnected(res.data);
          regCard.classList.add('hidden');
          document.getElementById('unlink-btn').addEventListener('click', unlink);
        } else {
          card.innerHTML = renderEmpty();
          regCard.classList.remove('hidden');
        }
      } catch (err) {
        card.innerHTML = `<div class="text-center py-6 text-red-500">조회 실패: ${esc(err.message)}</div>`;
      }
    }

    async function unlink() {
      if (!confirm('기기 연결을 해제하면 관련 태그/소지품 정보도 영향을 받을 수 있습니다. 계속할까요?')) return;
      try {
        await smartscanApi.unlinkDevice();
        smartscanLayout.toast('기기 연결을 해제했습니다.', 'success');
        load();
      } catch (err) {
        smartscanLayout.toast(err.message || '해제 실패', 'error');
      }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const serial = document.getElementById('serial-input').value.trim();
      if (!serial) return;
      const btn = document.getElementById('register-submit');
      btn.disabled = true;
      try {
        await smartscanApi.registerDevice(serial);
        smartscanLayout.toast('기기를 등록했습니다.', 'success');
        document.getElementById('serial-input').value = '';
        load();
      } catch (err) {
        smartscanLayout.toast(err.message || '등록 실패', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    load();
  </script>
</body>
</html>
