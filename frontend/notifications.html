<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>알림 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
  <script src="assets/api.js"></script>
  <script src="assets/layout.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden antialiased">
  <aside id="sidebar-mount"></aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center px-6 shrink-0">
      <h1 class="text-lg font-semibold text-slate-800">알림</h1>
    </header>

    <div class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto max-w-4xl w-full mx-auto">
      <div class="mb-6 flex items-start justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-900">내 알림</h2>
          <p class="text-slate-500 text-sm mt-1">수신한 알림을 확인하고 읽음 처리합니다.</p>
        </div>
        <button id="mark-all-btn" class="px-3.5 py-2 text-sm font-medium text-[#034EA2] border border-[#034EA2]/30 rounded-lg hover:bg-[#034EA2]/5 disabled:opacity-40">모두 읽음</button>
      </div>

      <div id="list" class="bg-white rounded-xl border border-slate-200 shadow-sm divide-y divide-slate-100">
        <div class="px-6 py-12 text-center text-slate-400">불러오는 중...</div>
      </div>
    </div>
  </main>

  <script>
    smartscanLayout.init({ active: 'notifications' });
    const esc = smartscanLayout.escapeHtml;
    const fmt = smartscanLayout.formatDateTime;

    let cached = [];

    function channelBadge(ch) {
      if (ch === 'kakao') return `<span class="px-2 py-0.5 rounded bg-yellow-100 text-yellow-800 text-xs font-medium">카카오</span>`;
      if (ch === 'sms') return `<span class="px-2 py-0.5 rounded bg-blue-100 text-blue-800 text-xs font-medium">SMS</span>`;
      return `<span class="px-2 py-0.5 rounded bg-slate-100 text-slate-600 text-xs font-medium">${esc(ch)}</span>`;
    }

    function render(list) {
      const mount = document.getElementById('list');
      if (list.length === 0) {
        mount.innerHTML = `<div class="px-6 py-12 text-center text-slate-400">받은 알림이 없습니다.</div>`;
        return;
      }
      mount.innerHTML = list.map((n) => {
        const unread = !n.is_read;
        const unreadStyle = unread ? 'bg-[#034EA2]/5' : '';
        const unreadDot = unread ? `<span class="w-2 h-2 rounded-full bg-[#034EA2] shrink-0 mt-2"></span>` : `<span class="w-2 h-2 shrink-0 mt-2"></span>`;
        return `
          <div class="px-6 py-4 hover:bg-slate-50 ${unreadStyle}" data-id="${n.id}">
            <div class="flex gap-3">
              ${unreadDot}
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                  <h3 class="font-semibold text-slate-900 truncate">${esc(n.title || '(제목 없음)')}</h3>
                  ${channelBadge(n.channel)}
                  <span class="ml-auto text-xs text-slate-400">${fmt(n.created_at)}</span>
                </div>
                <p class="text-sm text-slate-600 whitespace-pre-wrap">${esc(n.message || '')}</p>
                ${unread ? `<button data-action="read" class="mt-2 px-2.5 py-1 text-xs font-medium text-[#034EA2] border border-[#034EA2]/30 rounded-md hover:bg-[#034EA2]/5">읽음 처리</button>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      mount.querySelectorAll('button[data-action="read"]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const row = btn.closest('[data-id]');
          markRead(row.dataset.id);
        });
      });
    }

    async function markRead(id) {
      try {
        await smartscanApi.markNotificationAsRead(id);
        const n = cached.find((x) => String(x.id) === String(id));
        if (n) n.is_read = true;
        render(cached);
      } catch (err) {
        smartscanLayout.toast(err.message || '처리 실패', 'error');
      }
    }

    document.getElementById('mark-all-btn').addEventListener('click', async () => {
      const unread = cached.filter((n) => !n.is_read);
      if (unread.length === 0) return;
      const btn = document.getElementById('mark-all-btn');
      btn.disabled = true;
      try {
        await Promise.all(unread.map((n) => smartscanApi.markNotificationAsRead(n.id)));
        unread.forEach((n) => (n.is_read = true));
        render(cached);
        smartscanLayout.toast('모두 읽음 처리했습니다.', 'success');
      } catch (err) {
        smartscanLayout.toast(err.message || '처리 실패', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    async function load() {
      try {
        const res = await smartscanApi.getMyNotifications();
        cached = (res.data && res.data.notifications) || [];
        render(cached);
      } catch (err) {
        document.getElementById('list').innerHTML = `<div class="px-6 py-12 text-center text-red-500">조회 실패: ${esc(err.message)}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
