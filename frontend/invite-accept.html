<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가족 초대 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
  <script src="assets/api.js"></script>
  <script src="assets/layout.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

  <!-- 중앙 카드 -->
  <div class="w-full max-w-md">

    <!-- 로고 -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-[#034EA2] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="text-white">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">SmartScan Hub</h1>
      <p class="text-sm text-slate-500 mt-1">가족 초대</p>
    </div>

    <!-- 카드 본문 -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">

      <!-- 로딩 -->
      <div id="state-loading" class="text-center py-8 text-slate-400">
        <svg class="animate-spin mx-auto mb-3 w-8 h-8 text-[#034EA2]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        초대 정보를 불러오는 중입니다...
      </div>

      <!-- 잘못된 링크 -->
      <div id="state-invalid" class="hidden text-center py-8">
        <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
          </svg>
        </div>
        <h2 class="text-lg font-bold text-slate-800 mb-2">잘못된 링크</h2>
        <p class="text-slate-500 text-sm">초대 링크가 올바르지 않습니다.</p>
      </div>

      <!-- 만료/취소된 초대 -->
      <div id="state-expired" class="hidden text-center py-8">
        <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <h2 class="text-lg font-bold text-slate-800 mb-2">만료된 초대</h2>
        <p class="text-slate-500 text-sm">만료되었거나 취소된 초대입니다.</p>
      </div>

      <!-- 이미 수락된 초대 -->
      <div id="state-accepted" class="hidden text-center py-8">
        <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h2 class="text-lg font-bold text-slate-800 mb-2">이미 수락된 초대입니다.</h2>
        <p class="text-slate-500 text-sm mb-6">이미 가족의 구성원으로 등록되어 있습니다.</p>
        <a href="/dashboard.html" class="inline-block px-5 py-2.5 bg-[#034EA2] text-white text-sm font-semibold rounded-lg hover:bg-[#023d82]">대시보드로 이동</a>
      </div>

      <!-- 거절 완료 -->
      <div id="state-declined-done" class="hidden text-center py-8">
        <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400">
            <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/>
          </svg>
        </div>
        <h2 class="text-lg font-bold text-slate-800 mb-2">거절되었습니다</h2>
        <p class="text-slate-500 text-sm">초대를 거절했습니다.</p>
      </div>

      <!-- pending: 초대 수락 UI -->
      <div id="state-pending" class="hidden">

        <!-- 계정 불일치 경고 배너 -->
        <div id="email-mismatch-banner" class="hidden mb-5 px-4 py-3 rounded-lg bg-amber-50 border border-amber-200 text-sm text-amber-800">
          <p class="font-semibold mb-0.5">계정 불일치</p>
          <p id="email-mismatch-msg" class="text-xs leading-relaxed"></p>
          <a id="email-mismatch-login" href="#" class="mt-2 inline-block text-xs font-semibold text-[#034EA2] hover:underline">다른 계정으로 로그인</a>
        </div>

        <!-- 초대 정보 -->
        <div class="mb-6">
          <div class="w-14 h-14 rounded-full bg-[#034EA2]/10 flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#034EA2]">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-slate-900 text-center mb-1" id="inv-title"></h2>
          <p class="text-sm text-slate-500 text-center" id="inv-email-display"></p>
        </div>

        <!-- 상세 정보 박스 -->
        <div class="bg-slate-50 rounded-lg px-4 py-3 mb-6 space-y-2 text-sm">
          <div class="flex justify-between">
            <span class="text-slate-500">초대한 분</span>
            <span class="font-medium text-slate-800" id="inv-inviter"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-500">초대 대상</span>
            <span class="font-medium text-slate-800" id="inv-target-email"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-500">만료 일시</span>
            <span class="font-medium text-slate-800" id="inv-expires"></span>
          </div>
        </div>

        <!-- 버튼 영역 -->
        <div class="flex gap-3">
          <button id="btn-decline" class="flex-1 px-4 py-2.5 text-sm font-semibold text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50 disabled:opacity-50">
            거절
          </button>
          <button id="btn-accept" class="flex-2 flex-grow px-4 py-2.5 bg-[#034EA2] text-white text-sm font-semibold rounded-lg hover:bg-[#023d82] disabled:opacity-50">
            수락
          </button>
        </div>

      </div>

    </div>
  </div>

  <script>
    (function () {
      // ---- 상태 표시 헬퍼 ----
      const STATES = ['loading', 'invalid', 'expired', 'accepted', 'declined-done', 'pending'];
      function showState(name) {
        STATES.forEach((s) => {
          const el = document.getElementById('state-' + s);
          if (el) el.classList.toggle('hidden', s !== name);
        });
      }

      // ---- 날짜 한국어 포맷 ----
      function formatKo(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toLocaleString('ko-KR', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }

      // ---- URL에서 token 추출 ----
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      if (!token) {
        showState('invalid');
        return;
      }

      // 로그인 후 원래 URL로 돌아오기 위한 redirect 파라미터
      const redirectSelf = encodeURIComponent(location.pathname + location.search);

      let invData = null; // 초대 정보 캐시

      // ---- 초대 정보 로드 ----
      async function loadInvitation() {
        showState('loading');
        try {
          const res = await smartscanApi.getInvitationByToken(token);
          invData = (res && res.data) ? res.data : res;

          const status = invData.status;
          if (status === 'accepted') {
            showState('accepted');
            return;
          }
          if (status === 'declined' || status === 'cancelled' || status === 'expired') {
            showState('expired');
            return;
          }
          if (status !== 'pending') {
            // 알 수 없는 상태 — 만료로 처리
            showState('expired');
            return;
          }

          // pending UI 채우기
          document.getElementById('inv-title').textContent =
            `${invData.inviter_name}님이 '${invData.family_name}' 가족에 초대하셨습니다.`;
          document.getElementById('inv-email-display').textContent =
            `대상 이메일: ${invData.email}`;
          document.getElementById('inv-inviter').textContent = invData.inviter_name || '-';
          document.getElementById('inv-target-email').textContent = invData.email || '-';
          document.getElementById('inv-expires').textContent = formatKo(invData.expires_at);

          // 계정 불일치 체크
          const currentUser = smartscanApi.getUser();
          if (currentUser && currentUser.email &&
              currentUser.email.toLowerCase() !== (invData.email || '').toLowerCase()) {
            const banner = document.getElementById('email-mismatch-banner');
            const msg = document.getElementById('email-mismatch-msg');
            const link = document.getElementById('email-mismatch-login');
            msg.textContent =
              `현재 로그인한 계정(${currentUser.email})은 초대 대상(${invData.email})과 다릅니다. 대상 계정으로 로그인해주세요.`;
            link.href = `/login.html?redirect=${redirectSelf}`;
            banner.classList.remove('hidden');
            document.getElementById('btn-accept').disabled = true;
          }

          showState('pending');
        } catch (err) {
          // 404 또는 기타 오류 → 만료 처리
          if (err && err.status === 404) {
            showState('expired');
          } else {
            showState('expired');
          }
        }
      }

      // ---- 수락 처리 ----
      async function handleAccept() {
        // 미로그인 시 로그인 페이지로
        if (!smartscanApi.isLoggedIn()) {
          smartscanLayout.toast('로그인이 필요합니다', 'error');
          setTimeout(() => {
            location.href = `/login.html?redirect=${redirectSelf}`;
          }, 500);
          return;
        }

        const familyName = (invData && invData.family_name) ? invData.family_name : '해당 가족';
        if (!confirm(`현재 가족에서 탈퇴하고 '${familyName}' 가족에 합류합니다. 계속하시겠습니까?`)) return;

        const acceptBtn = document.getElementById('btn-accept');
        const declineBtn = document.getElementById('btn-decline');
        acceptBtn.disabled = true;
        declineBtn.disabled = true;
        acceptBtn.textContent = '처리 중...';

        try {
          await smartscanApi.acceptInvitation(token);
          smartscanLayout.toast('가족에 합류했습니다', 'success');
          setTimeout(() => { location.href = '/dashboard.html'; }, 1000);
        } catch (err) {
          smartscanLayout.toast(err.message || '수락 처리 중 오류가 발생했습니다.', 'error');
          acceptBtn.disabled = false;
          declineBtn.disabled = false;
          acceptBtn.textContent = '수락';
        }
      }

      // ---- 거절 처리 ----
      async function handleDecline() {
        if (!confirm('초대를 거절하시겠습니까?')) return;

        const acceptBtn = document.getElementById('btn-accept');
        const declineBtn = document.getElementById('btn-decline');
        acceptBtn.disabled = true;
        declineBtn.disabled = true;
        declineBtn.textContent = '처리 중...';

        try {
          await smartscanApi.declineInvitation(token);
          showState('declined-done');
        } catch (err) {
          smartscanLayout.toast(err.message || '거절 처리 중 오류가 발생했습니다.', 'error');
          acceptBtn.disabled = false;
          declineBtn.disabled = false;
          declineBtn.textContent = '거절';
        }
      }

      // ---- 이벤트 바인딩 ----
      document.getElementById('btn-accept').addEventListener('click', handleAccept);
      document.getElementById('btn-decline').addEventListener('click', handleDecline);

      // ---- 초기 로드 ----
      loadInvitation();
    })();
  </script>
</body>
</html>
