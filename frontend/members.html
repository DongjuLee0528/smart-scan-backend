<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구성원 관리 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="assets/styles.css" rel="stylesheet" />
  <script src="assets/api.js"></script>
  <script src="assets/common.js"></script>
  <script src="assets/layout.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden antialiased">
  <aside id="sidebar-mount"></aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
      <h1 class="text-lg font-semibold text-slate-800">구성원 관리</h1>
      <span id="family-name-pill" class="px-3 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-medium">-</span>
    </header>

    <div class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto max-w-5xl w-full mx-auto">
      <div class="flex items-start justify-between mb-6">
        <div>
          <h2 class="text-2xl font-bold text-slate-900">가족 구성원</h2>
          <p class="text-slate-500 text-sm mt-1">구성원 추가는 Admin 권한이 필요합니다.</p>
        </div>
        <button id="add-btn" class="px-4 py-2.5 bg-[#034EA2] text-white text-sm font-semibold rounded-lg hover:bg-[#023d82] flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          구성원 추가
        </button>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100 text-slate-500 bg-slate-50/50">
              <th class="text-left font-medium px-6 py-3">이름</th>
              <th class="text-left font-medium px-6 py-3">이메일</th>
              <th class="text-left font-medium px-6 py-3">전화번호</th>
              <th class="text-left font-medium px-6 py-3">나이</th>
              <th class="text-left font-medium px-6 py-3">역할</th>
              <th class="text-right font-medium px-6 py-3">작업</th>
            </tr>
          </thead>
          <tbody id="members-tbody" class="divide-y divide-slate-100">
            <tr><td colspan="6" class="px-6 py-8 text-center text-slate-400">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 class="text-lg font-bold text-slate-900">구성원 추가</h3>
        <button id="modal-close" class="p-1 text-slate-400 hover:text-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <form id="member-form" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">이름</label>
          <input id="m-name" type="text" required class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg bg-white" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">이메일</label>
          <input id="m-email" type="email" required class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg bg-white" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">전화번호</label>
          <input id="m-phone" type="tel" required placeholder="010-0000-0000" class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg bg-white" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">나이 (선택)</label>
          <input id="m-age" type="number" min="0" max="150" class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg bg-white" />
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="modal-cancel" class="px-4 py-2 text-sm font-medium text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50">취소</button>
          <button id="m-submit" type="submit" class="px-4 py-2 bg-[#034EA2] text-white text-sm font-semibold rounded-lg hover:bg-[#023d82] disabled:opacity-60">추가</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    smartscanLayout.init({ active: 'members' });
    const esc = smartscanLayout.escapeHtml;
    const modal = document.getElementById('modal');

    document.getElementById('add-btn').addEventListener('click', () => modal.classList.remove('hidden'));
    document.getElementById('modal-close').addEventListener('click', () => modal.classList.add('hidden'));
    document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.add('hidden'));

    document.getElementById('member-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        name: document.getElementById('m-name').value.trim(),
        email: document.getElementById('m-email').value.trim(),
        phone_number: document.getElementById('m-phone').value.trim(),
      };
      const ageRaw = document.getElementById('m-age').value.trim();
      if (ageRaw) body.age = parseInt(ageRaw, 10);
      const btn = document.getElementById('m-submit');
      btn.disabled = true;
      try {
        await smartscanApi.addFamilyMember(body);
        smartscanLayout.toast('추가되었습니다.', 'success');
        document.getElementById('member-form').reset();
        modal.classList.add('hidden');
        load();
      } catch (err) {
        smartscanLayout.toast(err.message || '추가 실패', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    async function removeMember(id, name) {
      if (!confirm(`'${name}'을(를) 삭제하시겠습니까?`)) return;
      try {
        await smartscanApi.deleteFamilyMember(id);
        smartscanLayout.toast('삭제되었습니다.', 'success');
        load();
      } catch (err) {
        smartscanLayout.toast(err.message || '삭제 실패', 'error');
      }
    }

    function roleBadge(role) {
      if (role === 'admin' || role === 'ADMIN') return `<span class="px-2 py-0.5 rounded bg-[#034EA2]/10 text-[#034EA2] text-xs font-semibold">관리자</span>`;
      return `<span class="px-2 py-0.5 rounded bg-slate-100 text-slate-600 text-xs font-semibold">구성원</span>`;
    }

    async function load() {
      const tbody = document.getElementById('members-tbody');
      try {
        const res = await smartscanApi.getFamilyMembers();
        const d = res.data || {};
        document.getElementById('family-name-pill').textContent = d.family_name || '-';
        const list = d.members || [];
        if (list.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">등록된 구성원이 없습니다.</td></tr>`;
          return;
        }
        tbody.innerHTML = list.map((m) => {
          const initial = esc((m.name || '?').charAt(0));
          return `
            <tr class="hover:bg-slate-50" data-id="${m.id}">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <div class="w-9 h-9 rounded-full bg-[#034EA2]/10 text-[#034EA2] flex items-center justify-center font-semibold text-sm">${initial}</div>
                  <span class="font-semibold text-slate-800">${esc(m.name)}</span>
                </div>
              </td>
              <td class="px-6 py-4 text-slate-600">${esc(m.email || '-')}</td>
              <td class="px-6 py-4 text-slate-600">${esc(m.phone_number || '-')}</td>
              <td class="px-6 py-4 text-slate-600">${m.age != null ? m.age : '-'}</td>
              <td class="px-6 py-4">${roleBadge(m.role)}</td>
              <td class="px-6 py-4 text-right">
                <button data-action="delete" class="px-2.5 py-1 text-xs font-medium text-red-600 border border-red-200 rounded-md hover:bg-red-50">삭제</button>
              </td>
            </tr>`;
        }).join('');

        tbody.querySelectorAll('button[data-action="delete"]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const row = btn.closest('tr');
            const id = row.dataset.id;
            const m = list.find((x) => String(x.id) === String(id));
            removeMember(id, m.name);
          });
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500">조회 실패: ${esc(err.message)}</td></tr>`;
      }
    }

    load();
  </script>
</body>
</html>
