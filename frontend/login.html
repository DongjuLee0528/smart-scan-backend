<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartScan Hub</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts: Inter + Noto Sans KR -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="assets/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen flex flex-col">

  <!-- Dark mode toggle -->
  <header class="fixed top-0 right-0 p-6 z-50">
    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
      <!-- Sun icon (light mode) -->
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           data-lucide="sun" class="lucide lucide-sun w-5 h-5 text-gray-600 dark:hidden">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path><path d="M12 20v2"></path>
        <path d="M4.93 4.93l1.41 1.41"></path><path d="M17.66 17.66l1.41 1.41"></path>
        <path d="M2 12h2"></path><path d="M20 12h2"></path>
        <path d="M6.34 17.66l-1.41 1.41"></path><path d="M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <!-- Moon icon (dark mode) -->
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           data-lucide="moon" class="lucide lucide-moon w-5 h-5 text-gray-300 hidden dark:block">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
      </svg>
    </button>
  </header>

  <!-- Main content -->
  <main class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md">

      <!-- Logo & Title -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 bg-[#034EA2] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               class="text-white w-10 h-10">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">SmartScan Hub</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">스마트홈 RFID 분실 방지 시스템</p>
      </div>

      <!-- Login Card -->
      <div class="glass-card shadow-xl rounded-2xl p-8 transition-all">
        <div class="mb-6">
          <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100">로그인</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400">서비스 이용을 위해 계정 정보를 입력해주세요.</p>
        </div>

        <!-- Error banner -->
        <div id="login-error" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300"></div>

        <form id="login-form" class="space-y-5">
          <!-- Email -->
          <div class="space-y-1.5">
            <label for="email" class="text-sm font-medium text-gray-700 dark:text-gray-300">이메일</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     data-lucide="mail" class="lucide lucide-mail text-gray-400">
                  <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                </svg>
              </div>
              <input
                id="email"
                type="email"
                placeholder="example@smartscan.com"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm"
              />
            </div>
          </div>

          <!-- Password -->
          <div class="space-y-1.5">
            <div class="flex items-center justify-between">
              <label for="password" class="text-sm font-medium text-gray-700 dark:text-gray-300">비밀번호</label>
              <a href="#" class="text-xs font-medium text-[#034EA2] dark:text-blue-400 hover:underline">비밀번호 찾기</a>
            </div>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     data-lucide="lock" class="lucide lucide-lock text-gray-400">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </div>
              <input
                id="password"
                type="password"
                placeholder="••••••••"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm"
              />
            </div>
          </div>

          <!-- Remember me -->
          <div class="flex items-center">
            <input
              id="remember"
              type="checkbox"
              class="h-4 w-4 text-[#034EA2] focus:ring-[#034EA2] border-gray-300 rounded cursor-pointer"
            />
            <label for="remember" class="ml-2 block text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
              로그인 상태 유지
            </label>
          </div>

          <!-- Submit button -->
          <button
            id="login-submit"
            type="submit"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-[#034EA2] hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#034EA2] transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
          >
            로그인
          </button>
        </form>

        <!-- Sign up link -->
        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 text-center">
          <p class="text-sm text-gray-500 dark:text-gray-400">
            계정이 없으신가요?&nbsp;
            <a href="signup.html" class="font-semibold text-[#034EA2] dark:text-blue-400 hover:underline">회원가입</a>
          </p>
        </div>

        <!-- Footer links -->
        <div class="mt-8 flex justify-center space-x-6 text-xs text-gray-400 dark:text-gray-500">
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">이용약관</a>
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">개인정보처리방침</a>
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">고객지원</a>
        </div>
      </div>

    </div>
  </main>

  <!-- SmartScan Hub API client -->
  <script src="assets/api.js"></script>
  <script src="assets/common.js"></script>

  <script src="assets/pages/login.js"></script>
</body>
</html>
