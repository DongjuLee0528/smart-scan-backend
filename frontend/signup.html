<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartScan Hub - 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .dark .glass-card {
      background: rgba(31, 41, 55, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen flex flex-col">

  <!-- Dark mode toggle -->
  <header class="fixed top-0 right-0 p-6 z-50">
    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           class="w-5 h-5 text-gray-600 dark:hidden">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path><path d="M12 20v2"></path>
        <path d="M4.93 4.93l1.41 1.41"></path><path d="M17.66 17.66l1.41 1.41"></path>
        <path d="M2 12h2"></path><path d="M20 12h2"></path>
        <path d="M6.34 17.66l-1.41 1.41"></path><path d="M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           class="w-5 h-5 text-gray-300 hidden dark:block">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
      </svg>
    </button>
  </header>

  <main class="flex-grow flex items-center justify-center p-4 py-12">
    <div class="w-full max-w-md">

      <!-- Logo & Title -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 bg-[#034EA2] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               class="text-white w-10 h-10">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">SmartScan Hub</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">스마트홈 RFID 분실 방지 시스템</p>
      </div>

      <!-- Signup Card -->
      <div class="glass-card shadow-xl rounded-2xl p-8 transition-all">
        <div class="mb-6">
          <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100">회원가입</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400">계정을 생성하고 소지품 관리를 시작하세요.</p>
        </div>

        <form class="space-y-5" onsubmit="return false;">
          <!-- 이름 -->
          <div class="space-y-1.5">
            <label for="name" class="text-sm font-medium text-gray-700 dark:text-gray-300">이름</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="text-gray-400">
                  <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </div>
              <input id="name" type="text" placeholder="홍길동"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
            </div>
          </div>

          <!-- 이메일 -->
          <div class="space-y-1.5">
            <label for="email" class="text-sm font-medium text-gray-700 dark:text-gray-300">이메일</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="text-gray-400">
                  <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                </svg>
              </div>
              <input id="email" type="email" placeholder="example@smartscan.com"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
            </div>
          </div>

          <!-- 비밀번호 -->
          <div class="space-y-1.5">
            <label for="password" class="text-sm font-medium text-gray-700 dark:text-gray-300">비밀번호</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="text-gray-400">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </div>
              <input id="password" type="password" placeholder="8자 이상 입력"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
            </div>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="space-y-1.5">
            <label for="password-confirm" class="text-sm font-medium text-gray-700 dark:text-gray-300">비밀번호 확인</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="text-gray-400">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path>
                  <path d="m9 12 2 2 4-4"></path>
                </svg>
              </div>
              <input id="password-confirm" type="password" placeholder="비밀번호 재입력"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
            </div>
          </div>

          <!-- 전화번호 + 나이 (한 줄) -->
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label for="phone" class="text-sm font-medium text-gray-700 dark:text-gray-300">전화번호</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                       class="text-gray-400">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                  </svg>
                </div>
                <input id="phone" type="tel" placeholder="010-1234-5678"
                  class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
              </div>
            </div>
            <div class="space-y-1.5">
              <label for="age" class="text-sm font-medium text-gray-700 dark:text-gray-300">나이</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                       class="text-gray-400">
                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                    <line x1="16" x2="16" y1="2" y2="6"></line>
                    <line x1="8" x2="8" y1="2" y2="6"></line>
                    <line x1="3" x2="21" y1="10" y2="10"></line>
                  </svg>
                </div>
                <input id="age" type="number" placeholder="25" min="1" max="120"
                  class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
              </div>
            </div>
          </div>

          <!-- 약관 동의 -->
          <div class="flex items-start">
            <input id="terms" type="checkbox"
              class="h-4 w-4 mt-0.5 text-[#034EA2] focus:ring-[#034EA2] border-gray-300 rounded cursor-pointer" />
            <label for="terms" class="ml-2 block text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
              <a href="#" class="text-[#034EA2] dark:text-blue-400 hover:underline">이용약관</a> 및
              <a href="#" class="text-[#034EA2] dark:text-blue-400 hover:underline">개인정보처리방침</a>에 동의합니다.
            </label>
          </div>

          <!-- 가입 버튼 -->
          <button type="submit"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-[#034EA2] hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#034EA2] transition-colors">
            회원가입
          </button>
        </form>

        <!-- Login link -->
        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 text-center">
          <p class="text-sm text-gray-500 dark:text-gray-400">
            이미 계정이 있으신가요?&nbsp;
            <a href="login.html" class="font-semibold text-[#034EA2] dark:text-blue-400 hover:underline">로그인</a>
          </p>
        </div>

        <!-- Footer links -->
        <div class="mt-8 flex justify-center space-x-6 text-xs text-gray-400 dark:text-gray-500">
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">이용약관</a>
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">개인정보처리방침</a>
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">고객지원</a>
        </div>
      </div>

    </div>
  </main>

  <script>
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });
  </script>
</body>
</html>
