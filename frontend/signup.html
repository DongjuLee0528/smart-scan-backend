<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartScan Hub - 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .dark .glass-card { background: rgba(31, 41, 55, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen flex flex-col">

  <header class="fixed top-0 right-0 p-6 z-50">
    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
      <i data-lucide="sun" class="w-5 h-5 text-gray-600 dark:hidden"></i>
      <i data-lucide="moon" class="w-5 h-5 text-gray-300 hidden dark:block"></i>
    </button>
  </header>

  <main class="flex-grow flex items-center justify-center p-4 py-12">
    <div class="w-full max-w-md">
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 bg-[#034EA2] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white w-10 h-10"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">SmartScan Hub</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">스마트홈 RFID 분실 방지 시스템</p>
      </div>

      <div class="glass-card shadow-xl rounded-2xl p-8 transition-all">
        <div class="mb-6">
          <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100">회원가입</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400">계정을 생성하고 소지품 관리를 시작하세요.</p>
        </div>

        <form id="signupForm" class="space-y-5">
          <div class="space-y-1.5">
            <label for="name" class="text-sm font-medium text-gray-700 dark:text-gray-300">이름</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="user" class="text-gray-400 w-4 h-4"></i></div>
              <input id="name" type="text" placeholder="홍길동" required class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#034EA2] transition-all sm:text-sm" />
            </div>
          </div>

          <div class="space-y-1.5">
            <label for="email" class="text-sm font-medium text-gray-700 dark:text-gray-300">이메일</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="mail" class="text-gray-400 w-4 h-4"></i></div>
              <input id="email" type="email" placeholder="example@smartscan.com" required class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#034EA2] transition-all sm:text-sm" />
            </div>
          </div>

          <div class="space-y-1.5">
            <label for="password" class="text-sm font-medium text-gray-700 dark:text-gray-300">비밀번호</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="lock" class="text-gray-400 w-4 h-4"></i></div>
              <input id="password" type="password" placeholder="8자 이상 입력" required class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#034EA2] transition-all sm:text-sm" />
            </div>
          </div>

          <div class="space-y-1.5">
            <label for="password-confirm" class="text-sm font-medium text-gray-700 dark:text-gray-300">비밀번호 확인</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="shield-check" class="text-gray-400 w-4 h-4"></i></div>
              <input id="password-confirm" type="password" placeholder="비밀번호 재입력" required class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#034EA2] transition-all sm:text-sm" />
            </div>
          </div>

          <div class="space-y-1.5">
            <label for="phone" class="text-sm font-medium text-gray-700 dark:text-gray-300">전화번호</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="phone" class="text-gray-400 w-4 h-4"></i></div>
              <input id="phone" type="tel" placeholder="010-1234-5678" required class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#034EA2] transition-all sm:text-sm" />
            </div>
          </div>

          <div class="flex items-start">
            <input id="terms" type="checkbox" required class="h-4 w-4 mt-0.5 text-[#034EA2] border-gray-300 rounded cursor-pointer" />
            <label for="terms" class="ml-2 block text-sm text-gray-600 dark:text-gray-400 cursor-pointer">이용약관 및 개인정보처리방침에 동의합니다.</label>
          </div>

          <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-[#034EA2] hover:bg-blue-800 transition-colors">회원가입</button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 text-center">
          <p class="text-sm text-gray-500 dark:text-gray-400">이미 계정이 있으신가요?&nbsp;<a href="login.html" class="font-semibold text-[#034EA2] dark:text-blue-400 hover:underline">로그인</a></p>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => { document.documentElement.classList.toggle('dark'); });

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('password-confirm').value;

      if (password !== confirm) { alert("비밀번호가 일치하지 않습니다."); return; }

      // 로컬 스토리지에 가입 정보 저장
      localStorage.setItem('userName', name);
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userPhone', phone);

      alert("회원가입이 완료되었습니다.");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
