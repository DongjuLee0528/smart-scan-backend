<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartScan Hub - 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .dark .glass-card {
      background: rgba(31, 41, 55, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen flex flex-col">

  <!-- Dark mode toggle -->
  <header class="fixed top-0 right-0 p-6 z-50">
    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           class="w-5 h-5 text-gray-600 dark:hidden">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path><path d="M12 20v2"></path>
        <path d="M4.93 4.93l1.41 1.41"></path><path d="M17.66 17.66l1.41 1.41"></path>
        <path d="M2 12h2"></path><path d="M20 12h2"></path>
        <path d="M6.34 17.66l-1.41 1.41"></path><path d="M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           class="w-5 h-5 text-gray-300 hidden dark:block">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
      </svg>
    </button>
  </header>

  <main class="flex-grow flex items-center justify-center p-4 py-12">
    <div class="w-full max-w-md">

      <!-- Logo & Title -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 bg-[#034EA2] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               class="text-white w-10 h-10">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">SmartScan Hub</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">스마트홈 RFID 분실 방지 시스템</p>
      </div>

      <!-- Signup Card -->
      <div class="glass-card shadow-xl rounded-2xl p-8 transition-all">
        <div class="mb-6">
          <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100">회원가입</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400">계정을 생성하고 소지품 관리를 시작하세요.</p>
        </div>

        <!-- Error / success banner -->
        <div id="signup-error" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300"></div>
        <div id="signup-success" class="hidden mb-4 px-4 py-3 rounded-lg bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-sm text-green-700 dark:text-green-300"></div>

        <form id="signup-form" class="space-y-5">
          <!-- 이름 -->
          <div class="space-y-1.5">
            <label for="name" class="text-sm font-medium text-gray-700 dark:text-gray-300">이름</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="text-gray-400">
                  <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </div>
              <input id="name" type="text" placeholder="홍길동"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
            </div>
          </div>

          <!-- 이메일 + 인증 -->
          <div class="space-y-1.5">
            <label for="email" class="text-sm font-medium text-gray-700 dark:text-gray-300">이메일</label>
            <div class="flex gap-2">
              <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                       class="text-gray-400">
                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                  </svg>
                </div>
                <input id="email" type="email" placeholder="example@smartscan.com"
                  class="block w-full pl-10 pr-8 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
                <span id="email-verified-check" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-green-600">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </span>
              </div>
              <button id="send-code-btn" type="button"
                class="shrink-0 px-3 py-2.5 text-xs font-semibold rounded-lg border border-[#034EA2] text-[#034EA2] hover:bg-[#034EA2] hover:text-white transition-colors disabled:opacity-60 disabled:cursor-not-allowed whitespace-nowrap">
                인증 코드 받기
              </button>
            </div>
            <!-- 인증 코드 입력 (코드 발송 후 표시) -->
            <div id="verify-code-row" class="hidden flex gap-2 pt-1">
              <input id="verify-code" type="text" inputmode="numeric" maxlength="6" placeholder="6자리 인증 코드"
                class="block flex-1 px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm tracking-widest" />
              <button id="verify-code-btn" type="button"
                class="shrink-0 px-4 py-2.5 text-xs font-semibold rounded-lg bg-[#034EA2] text-white hover:bg-blue-800 transition-colors disabled:opacity-60 disabled:cursor-not-allowed whitespace-nowrap">
                확인
              </button>
            </div>
            <p id="verify-hint" class="hidden text-xs text-gray-500 dark:text-gray-400 pt-1"></p>
          </div>

          <!-- 비밀번호 -->
          <div class="space-y-1.5">
            <label for="password" class="text-sm font-medium text-gray-700 dark:text-gray-300">비밀번호</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="text-gray-400">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </div>
              <input id="password" type="password" placeholder="8자 이상 입력"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
            </div>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="space-y-1.5">
            <label for="password-confirm" class="text-sm font-medium text-gray-700 dark:text-gray-300">비밀번호 확인</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="text-gray-400">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path>
                  <path d="m9 12 2 2 4-4"></path>
                </svg>
              </div>
              <input id="password-confirm" type="password" placeholder="비밀번호 재입력"
                class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
            </div>
          </div>

          <!-- 전화번호 + 나이 (한 줄) -->
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label for="phone" class="text-sm font-medium text-gray-700 dark:text-gray-300">전화번호</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                       class="text-gray-400">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                  </svg>
                </div>
                <input id="phone" type="tel" placeholder="010-1234-5678"
                  class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
              </div>
            </div>
            <div class="space-y-1.5">
              <label for="age" class="text-sm font-medium text-gray-700 dark:text-gray-300">나이</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                       class="text-gray-400">
                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                    <line x1="16" x2="16" y1="2" y2="6"></line>
                    <line x1="8" x2="8" y1="2" y2="6"></line>
                    <line x1="3" x2="21" y1="10" y2="10"></line>
                  </svg>
                </div>
                <input id="age" type="number" placeholder="25" min="1" max="120"
                  class="block w-full pl-10 pr-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#034EA2] focus:border-transparent transition-all sm:text-sm" />
              </div>
            </div>
          </div>

          <!-- 약관 동의 -->
          <div class="flex items-start">
            <input id="terms" type="checkbox"
              class="h-4 w-4 mt-0.5 text-[#034EA2] focus:ring-[#034EA2] border-gray-300 rounded cursor-pointer" />
            <label for="terms" class="ml-2 block text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
              <a href="#" class="text-[#034EA2] dark:text-blue-400 hover:underline">이용약관</a> 및
              <a href="#" class="text-[#034EA2] dark:text-blue-400 hover:underline">개인정보처리방침</a>에 동의합니다.
            </label>
          </div>

          <!-- 가입 버튼 -->
          <button id="signup-submit" type="submit" disabled
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-[#034EA2] hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#034EA2] transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
            회원가입
          </button>
          <p id="submit-hint" class="text-xs text-center text-gray-500 dark:text-gray-400 -mt-2">이메일 인증을 먼저 완료해주세요</p>
        </form>

        <!-- Login link -->
        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 text-center">
          <p class="text-sm text-gray-500 dark:text-gray-400">
            이미 계정이 있으신가요?&nbsp;
            <a href="login.html" class="font-semibold text-[#034EA2] dark:text-blue-400 hover:underline">로그인</a>
          </p>
        </div>

        <!-- Footer links -->
        <div class="mt-8 flex justify-center space-x-6 text-xs text-gray-400 dark:text-gray-500">
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">이용약관</a>
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">개인정보처리방침</a>
          <a href="#" class="hover:text-gray-600 dark:hover:text-gray-300">고객지원</a>
        </div>
      </div>

    </div>
  </main>

  <!-- SmartScan Hub API client -->
  <script src="assets/api.js"></script>

  <script>
    lucide.createIcons && lucide.createIcons();

    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });

    // ---- Signup 처리 ----
    const form = document.getElementById('signup-form');
    const submitBtn = document.getElementById('signup-submit');
    const submitHint = document.getElementById('submit-hint');
    const errorBox = document.getElementById('signup-error');
    const successBox = document.getElementById('signup-success');

    // ---- 이메일 인증 상태 ----
    const emailInput = document.getElementById('email');
    const sendCodeBtn = document.getElementById('send-code-btn');
    const verifyRow = document.getElementById('verify-code-row');
    const verifyInput = document.getElementById('verify-code');
    const verifyBtn = document.getElementById('verify-code-btn');
    const verifyHint = document.getElementById('verify-hint');
    const verifiedCheck = document.getElementById('email-verified-check');

    let emailVerified = false;
    let verifiedEmail = null;
    let cooldownTimer = null;

    function setVerified(email) {
      emailVerified = true;
      verifiedEmail = email;
      emailInput.readOnly = true;
      emailInput.classList.add('bg-gray-50', 'dark:bg-gray-700/40');
      verifiedCheck.classList.remove('hidden');
      sendCodeBtn.disabled = true;
      verifyBtn.disabled = true;
      verifyInput.disabled = true;
      verifyHint.textContent = '이메일 인증이 완료되었습니다.';
      verifyHint.classList.remove('hidden', 'text-red-600');
      verifyHint.classList.add('text-green-600');
      submitBtn.disabled = false;
      submitHint.classList.add('hidden');
    }

    function startCooldown(seconds) {
      let remaining = seconds;
      sendCodeBtn.disabled = true;
      const origText = '인증 코드 받기';
      const tick = () => {
        if (emailVerified) return;
        if (remaining <= 0) {
          sendCodeBtn.disabled = false;
          sendCodeBtn.textContent = '인증 코드 재전송';
          clearInterval(cooldownTimer);
          return;
        }
        sendCodeBtn.textContent = `재전송 (${remaining}s)`;
        remaining -= 1;
      };
      tick();
      cooldownTimer = setInterval(tick, 1000);
    }

    // 이메일 변경 시 인증 리셋
    emailInput.addEventListener('input', () => {
      if (emailVerified && emailInput.value.trim() !== verifiedEmail) {
        // 읽기전용이므로 발생 드묾. 방어 코드.
        emailVerified = false;
        verifiedCheck.classList.add('hidden');
        submitBtn.disabled = true;
        submitHint.classList.remove('hidden');
      }
    });

    sendCodeBtn.addEventListener('click', async () => {
      clearBanners();
      const email = emailInput.value.trim();
      if (!email || !/.+@.+\..+/.test(email)) {
        showError('유효한 이메일 주소를 입력해주세요.');
        return;
      }
      sendCodeBtn.disabled = true;
      const prev = sendCodeBtn.textContent;
      sendCodeBtn.textContent = '전송 중...';
      try {
        await smartscanApi.sendVerificationEmail(email);
        verifyRow.classList.remove('hidden');
        verifyRow.classList.add('flex');
        verifyHint.textContent = '이메일로 전송된 6자리 코드를 입력하세요. (5분 이내 유효)';
        verifyHint.classList.remove('hidden', 'text-red-600', 'text-green-600');
        verifyHint.classList.add('text-gray-500');
        showSuccess('인증 코드가 이메일로 발송되었습니다.');
        startCooldown(60);
      } catch (err) {
        const msg = (err && err.message) ? err.message : '인증 코드 발송에 실패했습니다.';
        showError(msg);
        sendCodeBtn.disabled = false;
        sendCodeBtn.textContent = prev;
      }
    });

    verifyBtn.addEventListener('click', async () => {
      clearBanners();
      const email = emailInput.value.trim();
      const code = verifyInput.value.trim();
      if (!/^\d{6}$/.test(code)) {
        showError('6자리 숫자 코드를 입력해주세요.');
        return;
      }
      verifyBtn.disabled = true;
      const prev = verifyBtn.textContent;
      verifyBtn.textContent = '확인 중...';
      try {
        await smartscanApi.verifyEmail(email, code);
        if (cooldownTimer) clearInterval(cooldownTimer);
        setVerified(email);
        showSuccess('이메일 인증이 완료되었습니다.');
      } catch (err) {
        const msg = (err && err.message) ? err.message : '인증에 실패했습니다. 코드를 확인해주세요.';
        showError(msg);
        verifyHint.textContent = '인증 코드가 올바르지 않거나 만료되었습니다.';
        verifyHint.classList.remove('hidden', 'text-gray-500', 'text-green-600');
        verifyHint.classList.add('text-red-600');
        verifyBtn.disabled = false;
        verifyBtn.textContent = prev;
      }
    });

    function showError(msg) {
      successBox.classList.add('hidden');
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }
    function showSuccess(msg) {
      errorBox.classList.add('hidden');
      successBox.textContent = msg;
      successBox.classList.remove('hidden');
    }
    function clearBanners() {
      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearBanners();

      if (!emailVerified) {
        showError('이메일 인증을 먼저 완료해주세요.');
        return;
      }

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('password-confirm').value;
      const phoneRaw = document.getElementById('phone').value.trim();
      const ageRaw = document.getElementById('age').value.trim();
      const terms = document.getElementById('terms').checked;

      // ---- 클라이언트 검증 ----
      if (!name || !email || !password) {
        showError('이름, 이메일, 비밀번호는 필수 입력 항목입니다.');
        return;
      }
      if (password.length < 8) {
        showError('비밀번호는 8자 이상이어야 합니다.');
        return;
      }
      if (password !== passwordConfirm) {
        showError('비밀번호가 일치하지 않습니다.');
        return;
      }
      if (!terms) {
        showError('이용약관 및 개인정보처리방침에 동의해주세요.');
        return;
      }

      const phone = phoneRaw || null;
      const age = ageRaw ? parseInt(ageRaw, 10) : null;

      submitBtn.disabled = true;
      const orig = submitBtn.textContent;
      submitBtn.textContent = '가입 중...';

      try {
        await smartscanApi.register({
          name,
          email,
          password,
          phone,
          age,
        });
        showSuccess('회원가입이 완료되었습니다. 로그인 페이지로 이동합니다...');
        setTimeout(() => location.replace('login.html'), 1200);
      } catch (err) {
        const msg = (err && err.message) ? err.message : '회원가입 중 오류가 발생했습니다.';
        showError(msg);
        submitBtn.disabled = false;
        submitBtn.textContent = orig;
      }
    });
  </script>
</body>
