<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: '#034EA2' } } } }
  </script>
  <link href="assets/styles.css" rel="stylesheet" />
  <style>
    @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
  </style>
  <script src="assets/api.js"></script>
  <script src="assets/common.js"></script>
  <script src="assets/layout.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden antialiased">

  <aside id="sidebar-mount"></aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0">
      <div class="flex items-center gap-2 text-slate-800 font-semibold">
        <span id="family-name">-</span>
        <span id="system-status" class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 text-xs font-medium">시스템 정상</span>
      </div>
    </header>

    <div class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto">
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900">대시보드</h1>
        <p class="text-slate-500 text-sm mt-1">가족 소지품 현황을 한눈에 확인하세요.</p>
      </div>

      <!-- 요약 카드 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-lg bg-[#034EA2]/10 text-[#034EA2] flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">전체 태그</p>
            <p class="text-2xl font-bold text-slate-900"><span id="stat-total">-</span><span class="text-sm font-medium text-slate-500 ml-0.5">개</span></p>
          </div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">정상 감지</p>
            <p class="text-2xl font-bold text-emerald-600"><span id="stat-found">-</span><span class="text-sm font-medium text-slate-500 ml-0.5">개</span></p>
          </div>
        </div>
        <div id="missing-card" class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-lg bg-red-100 text-red-600 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">누락 물품</p>
            <p class="text-2xl font-bold text-red-600"><span id="stat-lost">-</span><span class="text-sm font-medium text-slate-500 ml-0.5">개</span></p>
          </div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">구성원</p>
            <p class="text-2xl font-bold text-slate-900"><span id="stat-members">-</span><span class="text-sm font-medium text-slate-500 ml-0.5">명</span></p>
          </div>
        </div>
      </div>

      <!-- 가족 상태 현황 -->
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm mb-6">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
          <h2 class="text-lg font-bold text-slate-900">가족 상태 현황</h2>
          <a href="members.html" class="text-xs text-brand font-medium hover:underline">그룹 변경하기</a>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-slate-100 text-slate-500">
                <th class="text-left font-medium px-6 py-3">구성원</th>
                <th class="text-left font-medium px-6 py-3">등록 태그</th>
                <th class="text-left font-medium px-6 py-3">상태</th>
              </tr>
            </thead>
            <tbody id="members-tbody" class="divide-y divide-slate-100">
              <tr><td colspan="3" class="px-6 py-8 text-center text-slate-400">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        <!-- 내 태그 -->
        <div class="xl:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm">
          <div class="px-6 py-4 border-b border-slate-100">
            <h2 class="text-lg font-bold text-slate-900">내 태그 현황</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-slate-100 text-slate-500">
                  <th class="text-left font-medium px-6 py-3">태그명</th>
                  <th class="text-left font-medium px-6 py-3">소지품</th>
                  <th class="text-left font-medium px-6 py-3">상태</th>
                  <th class="text-left font-medium px-6 py-3">마지막 감지</th>
                </tr>
              </thead>
              <tbody id="mytags-tbody" class="divide-y divide-slate-100">
                <tr><td colspan="4" class="px-6 py-8 text-center text-slate-400">불러오는 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 원격 알림 보내기 -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
          <div class="px-6 py-4 border-b border-slate-100">
            <h2 class="text-lg font-bold text-slate-900">원격 알림 보내기</h2>
          </div>
          <form id="notify-form" class="p-6 space-y-4">
            <div class="space-y-1.5">
              <label class="block text-sm font-medium text-slate-700">구성원 선택</label>
              <select id="notify-user" required class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-[#034EA2]/20 focus:border-[#034EA2] bg-white text-slate-900">
                <option value="">구성원을 선택하세요</option>
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="block text-sm font-medium text-slate-700">채널</label>
              <select id="notify-channel" class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg shadow-sm bg-white">
                <option value="email">이메일</option>
                <option value="kakao">카카오톡</option>
                <option value="sms">SMS</option>
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="block text-sm font-medium text-slate-700">제목</label>
              <input id="notify-title" type="text" required placeholder="예: 지갑 챙기세요" class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg shadow-sm bg-white" />
            </div>
            <div class="space-y-1.5">
              <label class="block text-sm font-medium text-slate-700">메시지</label>
              <textarea id="notify-message" rows="3" required placeholder="알림 메시지를 입력하세요..." class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg shadow-sm bg-white resize-none"></textarea>
            </div>
            <button id="notify-submit" type="submit" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-[#034EA2] text-white text-sm font-semibold rounded-lg shadow-sm hover:bg-[#023d82] disabled:opacity-60 disabled:cursor-not-allowed">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
              알림 보내기
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/pages/dashboard.js"></script>
</body>
</html>
