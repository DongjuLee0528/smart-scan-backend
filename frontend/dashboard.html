<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#034EA2' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden antialiased selection:bg-[#034EA2]/20 selection:text-[#034EA2]">

  <aside class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-200">
      <div class="flex items-center gap-2 text-[#034EA2]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="text-xl font-bold tracking-tight">SmartScan Hub</span>
      </div>
    </div>
    <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-[#034EA2]/10 text-[#034EA2] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        <span class="font-medium text-sm">대시보드</span>
      </a>
      <a href="devices.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
        <span class="font-medium text-sm">기기 관리</span>
      </a>
      <a href="items.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
        <span class="font-medium text-sm">소지품 관리</span>
      </a>
      <a href="members.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="font-medium text-sm">구성원 관리</span>
      </a>
      <a href="notifications.html" class="flex items-center justify-between px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors">
        <div class="flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
          <span class="font-medium text-sm">알림</span>
        </div>
        <span class="text-xs font-semibold bg-red-100 text-red-600 px-2 py-0.5 rounded-full">2</span>
      </a>
    </nav>
    <div class="p-4 border-t border-slate-200">
      <div class="flex items-center gap-3">
        <div id="userAvatar" class="w-9 h-9 rounded-full bg-[#034EA2]/10 text-[#034EA2] flex items-center justify-center font-bold text-sm shrink-0">사</div>
        <div class="min-w-0">
          <p id="sidebarUserName" class="text-sm font-semibold text-slate-800 truncate">사용자</p>
          <p id="sidebarUserEmail" class="text-xs text-slate-500 truncate">user@smartscan-hub.com</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0">
      <div class="flex items-center gap-2 text-slate-800 font-semibold">
        <span id="welcomeMessage">가족 스마트홈</span>
        <span class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 text-xs font-medium">시스템 정상</span>
      </div>
    </header>

    <div class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto">
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900">대시보드</h1>
        <p class="text-slate-500 text-sm mt-1">고정된 가족 그룹의 실시간 현황입니다.</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-6 text-center">
        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <p class="text-xs text-slate-500 mb-1">고정 그룹</p>
          <p id="statGroupName" class="text-lg font-bold text-brand">-</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <p class="text-xs text-slate-500 mb-1">총 구성원</p>
          <p id="statMemberCount" class="text-lg font-bold text-slate-900">0명</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <p class="text-xs text-slate-500 mb-1">누락 물품</p>
          <p class="text-lg font-bold text-red-600">0건</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <p class="text-xs text-slate-500 mb-1">기기 상태</p>
          <p class="text-lg font-bold text-emerald-600">정상</p>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 shadow-sm mb-6">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
          <h2 class="text-lg font-bold text-slate-900">가족 상태 현황</h2>
          <a href="members.html" class="text-xs text-brand font-medium hover:underline">그룹 변경하기</a>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-slate-100 text-slate-500 text-left">
                <th class="px-6 py-3 font-medium">구성원</th>
                <th class="px-6 py-3 font-medium">소지품 목록</th>
                <th class="px-6 py-3 font-medium text-center">상태</th>
              </tr>
            </thead>
            <tbody id="dashboardTableBody" class="divide-y divide-slate-100">
              </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. 기본 유저 정보 세팅
      const savedName = localStorage.getItem('userName') || '사용자';
      const savedEmail = localStorage.getItem('userEmail') || 'user@smartscan-hub.com';
      document.getElementById('sidebarUserName').textContent = savedName;
      document.getElementById('sidebarUserEmail').textContent = savedEmail;
      document.getElementById('userAvatar').textContent = savedName.charAt(0);
      document.getElementById('welcomeMessage').textContent = `${savedName}님의 스마트홈`;

      // 2. 고정 그룹 데이터 로드 및 연동
      const allGroups = JSON.parse(localStorage.getItem('familyGroups')) || [];
      const pinnedGroup = allGroups.find(g => g.isPinned === true);
      const tableBody = document.getElementById('dashboardTableBody');

      if (pinnedGroup) {
        document.getElementById('statGroupName').textContent = pinnedGroup.name;
        document.getElementById('statMemberCount').textContent = `${pinnedGroup.members.length}명`;

        tableBody.innerHTML = pinnedGroup.members.map(m => `
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center font-bold text-xs text-slate-500">${m.name.charAt(0)}</div>
                <span class="font-semibold text-slate-800">${m.name}</span>
              </div>
            </td>
            <td class="px-6 py-4">
              <div class="flex flex-wrap gap-2">
                ${m.items.map(i => `<span class="bg-emerald-50 text-emerald-700 text-[11px] px-2 py-0.5 rounded-full border border-emerald-100">${i}</span>`).join('')}
              </div>
            </td>
            <td class="px-6 py-4 text-center">
              <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-bold">
                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div> 정상
              </span>
            </td>
          </tr>
        `).join('');
      } else {
        tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-12 text-center text-slate-400 font-medium">고정된 가족 그룹이 없습니다. '구성원 관리'에서 핀을 설정해 주세요.</td></tr>`;
      }
    });
  </script>
</body>
</html>
