<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설정 - SmartScan Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
  <script src="assets/api.js"></script>
  <script src="assets/layout.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden antialiased">
  <aside id="sidebar-mount"></aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center px-6 shrink-0">
      <h1 class="text-lg font-semibold text-slate-800">설정</h1>
    </header>

    <div class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto max-w-3xl w-full mx-auto space-y-6">

      <!-- 내 계정 -->
      <section class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="px-6 py-4 border-b border-slate-100">
          <h2 class="text-lg font-bold text-slate-900">내 계정</h2>
        </div>
        <div class="p-6 space-y-3 text-sm">
          <div class="flex items-center gap-3">
            <div id="user-avatar" class="w-14 h-14 rounded-full bg-[#034EA2]/10 text-[#034EA2] flex items-center justify-center font-bold text-lg">-</div>
            <div>
              <p id="user-name" class="font-semibold text-slate-900 text-base">-</p>
              <p id="user-email" class="text-slate-500">-</p>
            </div>
          </div>
          <dl class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2 pt-3 border-t border-slate-100">
            <div class="flex justify-between"><dt class="text-slate-500">User ID</dt><dd id="user-id" class="font-mono text-slate-700">-</dd></div>
            <div class="flex justify-between"><dt class="text-slate-500">카카오 연동</dt><dd id="user-kakao" class="text-slate-700">-</dd></div>
          </dl>
        </div>
      </section>

      <!-- 가족 정보 -->
      <section class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="px-6 py-4 border-b border-slate-100">
          <h2 class="text-lg font-bold text-slate-900">가족 정보</h2>
        </div>
        <div class="p-6">
          <dl id="family-info" class="text-sm space-y-2">
            <div class="flex justify-between"><dt class="text-slate-500">불러오는 중...</dt><dd></dd></div>
          </dl>
        </div>
      </section>

      <!-- 기기 -->
      <section class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h2 class="text-lg font-bold text-slate-900">연결된 기기</h2>
          <a href="devices.html" class="text-xs text-[#034EA2] font-semibold hover:underline">관리 →</a>
        </div>
        <div id="device-info" class="p-6 text-sm text-slate-500">불러오는 중...</div>
      </section>

      <!-- 위험 구역 -->
      <section class="bg-white rounded-xl border border-red-200 shadow-sm">
        <div class="px-6 py-4 border-b border-red-100">
          <h2 class="text-lg font-bold text-red-700">위험 구역</h2>
        </div>
        <div class="p-6 space-y-3">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-sm font-semibold text-slate-900">로그아웃</p>
              <p class="text-xs text-slate-500 mt-0.5">현재 브라우저에서 로그아웃합니다.</p>
            </div>
            <button id="logout-btn-2" class="px-3.5 py-2 text-sm font-medium text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50">로그아웃</button>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script>
    smartscanLayout.init({ active: 'settings' });
    const esc = smartscanLayout.escapeHtml;
    const fmt = smartscanLayout.formatDateTime;

    function renderUser() {
      const u = smartscanApi.getUser() || {};
      document.getElementById('user-name').textContent = u.name || '-';
      document.getElementById('user-email').textContent = u.email || '-';
      document.getElementById('user-id').textContent = u.user_id || '-';
      document.getElementById('user-avatar').textContent = (u.name || '?').charAt(0);
      document.getElementById('user-kakao').textContent = u.kakao_user_id ? `연동됨 (${u.kakao_user_id.slice(0, 8)}…)` : '미연동';
    }

    async function loadFamily() {
      const dl = document.getElementById('family-info');
      try {
        const res = await smartscanApi.getFamilyMembers();
        const d = res.data || {};
        dl.innerHTML = `
          <div class="flex justify-between"><dt class="text-slate-500">가족명</dt><dd class="text-slate-800 font-medium">${esc(d.family_name || '-')}</dd></div>
          <div class="flex justify-between"><dt class="text-slate-500">가족 ID</dt><dd class="font-mono text-slate-700">${esc(d.family_id || '-')}</dd></div>
          <div class="flex justify-between"><dt class="text-slate-500">구성원 수</dt><dd class="text-slate-800 font-medium">${d.total_count || 0}명</dd></div>
        `;
      } catch (err) {
        dl.innerHTML = `<div class="text-red-500">조회 실패: ${esc(err.message)}</div>`;
      }
    }

    async function loadDevice() {
      const box = document.getElementById('device-info');
      try {
        const res = await smartscanApi.getMyDevice();
        if (!res.data) {
          box.innerHTML = `<p class="text-slate-500">등록된 기기가 없습니다. <a class="text-[#034EA2] hover:underline" href="devices.html">기기 등록하기</a></p>`;
          return;
        }
        const d = res.data;
        box.innerHTML = `
          <dl class="space-y-2">
            <div class="flex justify-between"><dt class="text-slate-500">시리얼 번호</dt><dd class="font-mono text-slate-800">${esc(d.device && d.device.serial_number || '-')}</dd></div>
            <div class="flex justify-between"><dt class="text-slate-500">연결일</dt><dd class="text-slate-700">${fmt(d.created_at)}</dd></div>
          </dl>`;
      } catch (err) {
        box.innerHTML = `<p class="text-red-500">조회 실패: ${esc(err.message)}</p>`;
      }
    }

    document.getElementById('logout-btn-2').addEventListener('click', async () => {
      try { await smartscanApi.logout(); } catch (_) {}
      location.replace('login.html');
    });

    renderUser();
    loadFamily();
    loadDevice();
  </script>
</body>
</html>
